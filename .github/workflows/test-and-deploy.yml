# .github/workflows/test-and-deploy.yml

name: Test and Deploy Report

on:
  push:
    branches:
      - EL-1-cypress

jobs:
  # 1. Install dependencies once and cache them
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache node modules and Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/Cypress
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Upload node_modules for parallel jobs
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules

  # 2. Run each spec file in parallel
  cypress-run:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec:
          - cypress/e2e/functional/cron_systemd_helper.cy.js
          - cypress/e2e/functional/dioden.cy.js
          - cypress/e2e/functional/filter.cy.js
          - cypress/e2e/functional/gleichstrom.cy.js
          - cypress/e2e/functional/hst.cy.js
          - cypress/e2e/functional/kondensator.cy.js
          - cypress/e2e/functional/magnetismus.cy.js
          - cypress/e2e/functional/mathe.cy.js
          - cypress/e2e/functional/opv.cy.js
          - cypress/e2e/functional/schwingkreis.cy.js
          - cypress/e2e/functional/spule.cy.js
          - cypress/e2e/functional/transformator.cy.js
          - cypress/e2e/functional/verstaerkung_daempfung.cy.js
          - cypress/e2e/functional/wechselstrom.cy.js
          - cypress/e2e/functional/werkstoffe.cy.js

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Start local server (background)
        run: python3 -m http.server 8080 &

      - name: Run Cypress for ${{ matrix.spec }}
        run: npx cypress run --spec ${{ matrix.spec }}

      - name: Upload Mochawesome JSON
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-json-${{ matrix.spec }}
          path: cypress/results/*.json

      - name: Upload Cypress screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.spec }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress run log
        uses: actions/upload-artifact@v4
        with:
          name: cypress-run-log-${{ matrix.spec }}
          path: cypress-run.log
          if-no-files-found: ignore

  # 3. Merge reports, generate gallery, and deploy
  merge-and-deploy:
    needs: cypress-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all Mochawesome JSON
        uses: actions/download-artifact@v4
        with:
          path: mochawesome-json

      - name: Download all screenshots
        uses: actions/download-artifact@v4
        with:
          path: cypress/screenshots

      - name: Merge and generate HTML report
        run: |
          npx mochawesome-merge mochawesome-json/**/*.json > merged.json
          npx marge merged.json --reportDir=public

      - name: Prepare screenshots for Pages
        run: |
          mkdir -p ./public/screenshots
          cp -r cypress/screenshots/* ./public/screenshots/ || true

      - name: Generate improved screenshot gallery with search
        run: cypress/support/generate-screenshot-gallery.sh

      - name: Check for report
        run: |
          if [ ! -f ./public/index.html ]; then
            echo "❌ Report not found! Test run may have failed."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post summary with report and gallery links
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://paul1404.github.io/elecalculate/`;
            const gallery = `https://paul1404.github.io/elecalculate/screenshots/index.html`;
            core.summary
              .addHeading('Test Report')
              .addLink('View HTML Report', url)
              .addLink('Screenshot Gallery', gallery)
              .write();