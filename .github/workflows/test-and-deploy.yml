name: Test and Deploy Report

on:
  push:
    branches:
      - EL-1-cypress

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec:
          - cypress/e2e/functional/cron_systemd_helper.cy.js
          - cypress/e2e/functional/dioden.cy.js
          - cypress/e2e/functional/filter.cy.js
          - cypress/e2e/functional/gleichstrom.cy.js
          - cypress/e2e/functional/hst.cy.js
          - cypress/e2e/functional/kondensator.cy.js
          - cypress/e2e/functional/magnetismus.cy.js
          - cypress/e2e/functional/mathe.cy.js
          - cypress/e2e/functional/opv.cy.js
          - cypress/e2e/functional/schwingkreis.cy.js
          - cypress/e2e/functional/spule.cy.js
          - cypress/e2e/functional/transformator.cy.js
          - cypress/e2e/functional/verstaerkung_daempfung.cy.js
          - cypress/e2e/functional/wechselstrom.cy.js
          - cypress/e2e/functional/werkstoffe.cy.js

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Cypress for ${{ matrix.spec }}
        uses: cypress-io/github-action@v6
        with:
          start: python3 -m http.server 8080
          spec: ${{ matrix.spec }}
          browser: chrome

      - name: Set artifact name
        id: artifact
        run: |
          SPEC_BASENAME=$(basename "${{ matrix.spec }}" .cy.js)
          echo "spec_basename=$SPEC_BASENAME" >> $GITHUB_OUTPUT

      - name: Rename mochawesome.json to unique name
        run: |
          mv cypress/results/.jsons/mochawesome.json cypress/results/.jsons/mochawesome-${{ steps.artifact.outputs.spec_basename }}.json

      - name: Upload Mochawesome JSON
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-json-${{ steps.artifact.outputs.spec_basename }}
          path: cypress/results/.jsons/mochawesome-${{ steps.artifact.outputs.spec_basename }}.json
          if-no-files-found: error

      - name: Upload Cypress screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ steps.artifact.outputs.spec_basename }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ steps.artifact.outputs.spec_basename }}
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Cypress run log
        uses: actions/upload-artifact@v4
        with:
          name: cypress-run-log-${{ steps.artifact.outputs.spec_basename }}
          path: cypress-run.log
          if-no-files-found: ignore

  merge-and-deploy:
    needs: cypress-run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print working directory
        run: pwd

      - name: Install dependencies for report generation
        run: npm ci

      # Download all Mochawesome JSON artifacts from all parallel jobs
      - name: Download all Mochawesome JSON
        uses: actions/download-artifact@v4
        with:
          path: mochawesome-json

      - name: List all downloaded Mochawesome JSONs
        run: |
          echo "Listing all mochawesome JSON files:"
          find mochawesome-json -type f -name "*.json" | tee /tmp/mochawesome-json-list.txt

      # Download all screenshots from all parallel jobs
      - name: Download all screenshots
        uses: actions/download-artifact@v4
        with:
          path: cypress/screenshots

      - name: List all downloaded screenshots
        run: |
          echo "Listing all screenshots:"
          find cypress/screenshots -type f -name "*.png" | tee /tmp/screenshots-list.txt

      # Download all videos from all parallel jobs
      - name: Download all videos
        uses: actions/download-artifact@v4
        with:
          path: cypress/videos

      - name: List all downloaded videos
        run: |
          echo "Listing all videos:"
          find cypress/videos -type f -name "*.mp4" | tee /tmp/videos-list.txt

      # Merge all JSON reports and generate the final HTML report
      - name: Merge Mochawesome JSON reports
        run: |
          echo "Merging JSON reports..."
          npx mochawesome-merge mochawesome-json/**/*.json > merged.json
          echo "Merged JSON report created at $(pwd)/merged.json"
          ls -lh merged.json

      - name: Generate final Mochawesome HTML report
        run: |
          echo "Generating HTML report..."
          npx marge merged.json --reportDir=public --reportFilename=index.html --enableCharts --reportPageTitle "Elecalculate Testing Framework"
          echo "HTML report generated at $(pwd)/public/index.html"
          ls -lh public/index.html

      - name: Fix all screenshot and video paths in report
        run: |
          sed -i 's|src="/\([^"]*\.cy\.js/[^"]*\.png\)"|src="screenshots/\1"|g' public/index.html
          sed -i 's|href="/\([^"]*\.cy\.js/[^"]*\.png\)"|href="screenshots/\1"|g' public/index.html
          sed -i 's|src="/\([^"]*\.cy\.js/[^"]*\.mp4\)"|src="videos/\1"|g' public/index.html
          sed -i 's|href="/\([^"]*\.cy\.js/[^"]*\.mp4\)"|href="videos/\1"|g' public/index.html

      # Copy all screenshots and videos to the public directory, preserving structure
      - name: Flatten screenshots into public/screenshots
        run: |
          mkdir -p public/screenshots
          find cypress/screenshots -type f -name "*.png" | while read img; do
            specdir=$(echo "$img" | grep -oE '[^/]+\.cy\.js' | head -n1)
            if [ -n "$specdir" ]; then
              mkdir -p "public/screenshots/$specdir"
              cp "$img" "public/screenshots/$specdir/"
              echo "Copied $img to public/screenshots/$specdir/"
            else
              echo "WARNING: Could not determine specdir for $img"
            fi
          done
          echo "Final screenshot structure:"
          find public/screenshots

      - name: Flatten videos into public/videos
        run: |
          mkdir -p public/videos
          find cypress/videos -type f -name "*.mp4" | while read vid; do
            specdir=$(echo "$vid" | grep -oE '[^/]+\.cy\.js' | head -n1)
            if [ -n "$specdir" ]; then
              mkdir -p "public/videos/$specdir"
              cp "$vid" "public/videos/$specdir/"
              echo "Copied $vid to public/videos/$specdir/"
            else
              echo "WARNING: Could not determine specdir for $vid"
            fi
          done
          echo "Final video structure:"
          find public/videos

      # Defensive scripting: check for report existence
      - name: Check for report
        run: |
          if [ ! -f ./public/index.html ]; then
            echo "❌ Report not found! Test run may have failed."
            exit 1
          fi
          echo "Report found at ./public/index.html"

      - name: List final public directory
        run: |
          echo "Listing all files in ./public:"
          find ./public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post summary with report and gallery links
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://paul1404.github.io/elecalculate/`;
            const gallery = `https://paul1404.github.io/elecalculate/screenshots/index.html`;
            core.summary
              .addHeading('Test Report')
              .addLink('View HTML Report', url)
              .addLink('Screenshot Gallery', gallery)
              .write();